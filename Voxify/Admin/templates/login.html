<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — SecureVote</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="{{ url_for('admin.static', filename='css/admin.css') }}" rel="stylesheet"/>
  <link href="{{ url_for('admin.static', filename='css/login_admin.css') }}" rel="stylesheet"/>
</head>
<body class="login-body">

<div class="login-bg">
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-orb login-orb-3"></div>
</div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
      <h1 class="login-title">SecureVote</h1>
      <p class="login-subtitle">Administrator Access Portal</p>
    </div>

    <div class="form-group-login">
      <label class="form-label-login">Username</label>
      <div class="input-icon-wrap">
        <i class="bi bi-person-fill input-icon"></i>
        <input type="text" name="username" class="form-control form-control-login"
               placeholder="Enter your username" autocomplete="username"/>
      </div>
    </div>

    <div class="form-group-login">
      <label class="form-label-login">Password</label>
      <div class="input-icon-wrap">
        <i class="bi bi-lock-fill input-icon"></i>
        <input type="password" name="password" id="loginPassword"
               class="form-control form-control-login"
               placeholder="Enter your password" autocomplete="current-password"/>
        <button type="button" class="password-toggle" onclick="togglePassword()">
          <i class="bi bi-eye-fill" id="toggleIcon"></i>
        </button>
      </div>
    </div>

    <button type="button" class="btn-login">
      <i class="bi bi-shield-check me-2"></i>Secure Login
    </button>

    <div class="login-footer">
      <i class="bi bi-lock-fill me-1"></i>
      Secured with bcrypt encryption & session authentication
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
  const input = document.getElementById('loginPassword');
  const icon = document.getElementById('toggleIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash-fill';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye-fill';
  }
}
</script>
</body>
</html>
